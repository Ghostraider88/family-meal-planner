name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - main-update

# Cancel superseded runs on the same ref to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
      # Audit is informational; production-blocking issues should be resolved
      # but transient advisories must not break the pipeline.
      - run: npm audit --audit-level=high || true

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high || true

  compose-validate:
    name: docker-compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate dev compose
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate prod compose
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password_strong_enough_for_ci
          JWT_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          CORS_ORIGIN: http://localhost:8087
        run: docker compose -f docker-compose.prod.yml config --quiet

  docker-build:
    name: docker build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - name: Build backend image
        run: docker build -f backend/Dockerfile.prod -t fmp-backend:ci ./backend
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.prod -t fmp-frontend:ci ./frontend
