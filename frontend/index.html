<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Meal Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-blue: #00C5FF;
      --purple: #550AA8;
      --dark-blue: #003457;
      --light-blue: #D4EDFC;
      --yellow: #FFDD00;
      --black: #000000;
      --white: #FFFFFF;
      --grey-180: #403E4E;
      --grey-80: #8B91A3;
      --grey-50: #B2B7C7;
      --grey-20: #E3E6EF;
      --grey-5: #F0F2F9;
      --signal-red: #FF0048;
      --approval-green: #3DB384;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--white);
      color: var(--grey-180);
      font-size: 16px;
      line-height: 1.5;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
