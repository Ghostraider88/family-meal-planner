# Development Compose — DO NOT USE IN PRODUCTION.
# This file mounts source for hot reload, exposes Postgres on the host, and uses
# weak default secrets that are only acceptable for local development.
# For production, use docker-compose.prod.yml.

services:
  postgres:
    image: postgres:15-alpine
    container_name: family-meal-planner-db
    environment:
      POSTGRES_DB: family_meal_planner
      POSTGRES_USER: planner_user
      POSTGRES_PASSWORD: dev_password_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner_user -d family_meal_planner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-meal-planner-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: family_meal_planner
      DB_USER: planner_user
      DB_PASSWORD: dev_password_only
      # Dev-only secrets. Production loads its own from .env via docker-compose.prod.yml.
      JWT_SECRET: dev-jwt-secret-not-for-production-use-min-32-chars-x
      JWT_REFRESH_SECRET: dev-refresh-secret-not-for-production-use-min-32-chars
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://192.168.10.206:3029
      FRONTEND_URL: http://localhost:3029
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      SMTP_SERVICE: ${SMTP_SERVICE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TRUST_PROXY: loopback
      LOG_LEVEL: debug
    ports:
      - "3030:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-meal-planner-ui
    environment:
      # Used by vite.config.js at startup to set the proxy target
      VITE_API_URL: http://backend:3001
    ports:
      - "3029:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  default:
    name: family-meal-planner-network
