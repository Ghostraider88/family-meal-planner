server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload size for PDF imports / images
    client_max_body_size 12m;

    # Hide Nginx version
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static hashed assets aggressively
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        # Do not cache the HTML shell
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Static health endpoint for container healthcheck / load balancers
    location = /health.txt {
        access_log off;
        add_header Content-Type text/plain;
    }

    # API proxy to backend (same-origin from browser perspective)
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming / long polls if ever needed
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Block dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
